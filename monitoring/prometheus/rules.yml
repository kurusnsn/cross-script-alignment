groups:
  - name: alignai.api
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_errors_total[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "High error rate on API"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "High P95 latency on API"
          description: "P95 latency is {{ $value | humanizeDuration }} — threshold is 2s."

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.job }}"
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Instance {{ $labels.instance }} has been unreachable for more than 1 minute."

  - name: alignai.database
    interval: 60s
    rules:
      - alert: DBPoolExhausted
        expr: db_pool_usage_ratio > 0.9
        for: 2m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "DB connection pool near exhaustion"
          description: "Pool usage is {{ $value | humanizePercentage }}."

  - name: alignai.workers
    interval: 60s
    rules:
      - alert: WorkerUtilizationCritical
        expr: worker_utilization_percent > 99
        for: 2m
        labels:
          severity: critical
          service: align-worker
        annotations:
          summary: "Translit worker is saturated"
          description: "Worker utilization is {{ $value }}%."

      - alert: EventLoopLagCritical
        expr: event_loop_lag_seconds > 0.5
        for: 1m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "Python event loop severely lagging"
          description: "Event loop lag is {{ $value | humanizeDuration }}."

  - name: alignai.traces
    interval: 30s
    rules:
      - alert: TraceErrorRateHigh
        expr: |
          sum(rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m]))
          / sum(rate(traces_spanmetrics_calls_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
          service: traces
        annotations:
          summary: "High trace error rate across services"
          description: "More than 5% of spans are in ERROR state — check Jaeger."
