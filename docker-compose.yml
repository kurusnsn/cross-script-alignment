
services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - align_net

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=http://api:8000
        - NEXT_PUBLIC_API_URL=https://api.alignai.com
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    env_file: .env.local
    environment:
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - align_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: backend/.env
    restart: unless-stopped
    ports:
      - "8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
      - clts_data:/opt/clts
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=api
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_DATASETS_CACHE=/root/.cache/huggingface
    labels:
      - "caddy=api.alignai.com"
      - "caddy.reverse_proxy=api:8000"
    networks:
      - align_net
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: langapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - align_net
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - align_net
  tts:
    build:
      context: ./backend/tts-service
      dockerfile: Dockerfile
    ports:
      - "8001"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./backend/tts-service:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/tranquil-marker-473915-f5-e4d1fc4c2006.json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_USERNAME=${REDIS_USERNAME:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_CACHE_TTL_SECONDS=${REDIS_CACHE_TTL_SECONDS:-604800}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=tts-service
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
    networks:
      - align_net
  align-worker:
    build:
      context: ./alignment-service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - stanza_cache:/root/stanza_resources
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=align-worker
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - STANZA_RESOURCES_DIR=/root/stanza_resources
    deploy:
      resources:
        limits:
          memory: 14g
    networks:
      - align_net

  # ── Observability ────────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-collector.yml"]
    volumes:
      - ./monitoring/otel/otel-collector.yml:/etc/otel/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    depends_on:
      - jaeger
      - loki
    networks:
      - align_net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
    networks:
      - align_net

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    user: "0:0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules/rules.yml:ro
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9090:9090"
    networks:
      - align_net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        sed "s|__ALERT_WEBHOOK_URL__|$${ALERT_WEBHOOK_URL}|g" /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    environment:
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-http://127.0.0.1:65535/webhook}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - align_net

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - ./monitoring/loki/rules.yml:/loki/rules/fake/rules.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - align_net

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_UNIFIED_ALERTING_ENABLED=true
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - align_net

volumes:
  pgdata:
  hf_cache:
  clts_data:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  loki_data:
  grafana_data:
  stanza_cache:
networks:
  align_net:
    driver: bridge
