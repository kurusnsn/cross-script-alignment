services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - hf_cache:/root/.cache/huggingface
      - clts_data:/opt/clts
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: langapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
  hf_cache:
  clts_data:
