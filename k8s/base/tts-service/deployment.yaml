apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  namespace: align
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts-service
  template:
    metadata:
      labels:
        app: tts-service
    spec:
      imagePullSecrets:
      - name: gitlab-registry
      containers:
      - name: tts-service
        image: registry.gitlab.com/kurusnsn/cross-script-alignment/tts:latest  # Placeholder
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        env:
        - name: DEPLOYMENT_ENV
          value: "production"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.monitoring.svc.cluster.local:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: tts-service
  namespace: align
spec:
  ports:
  - port: 80
    targetPort: 8001
  selector:
    app: tts-service
