mode: deployment
image:
  repository: otel/opentelemetry-collector-contrib
presets:
  kubernetesAttributes:
    enabled: true
  kubeletMetrics:
    enabled: true
config:
  exporters:
    otlp:
      endpoint: jaeger-collector:4317
      tls:
        insecure: true
    loki:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
    prometheus:
      endpoint: "0.0.0.0:8889"

  # Convert trace spans into span metrics (error rate, latency by service/operation)
  # so Prometheus/Alertmanager can alert on Jaeger trace data.
  connectors:
    spanmetrics:
      histogram:
        explicit:
          buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
      dimensions:
        - name: http.method
        - name: http.status_code
        - name: service.name
        - name: deployment.environment
      exemplars:
        enabled: true

  service:
    pipelines:
      traces:
        receivers: [otlp, jaeger, zipkin]
        processors: [k8sattributes, memory_limiter, batch]
        exporters: [otlp, spanmetrics]
      metrics:
        receivers: [otlp, prometheus, kubeletstats, spanmetrics]
        processors: [k8sattributes, memory_limiter, batch]
        exporters: [prometheus]
      logs:
        receivers: [otlp]
        processors: [k8sattributes, memory_limiter, batch]
        exporters: [loki]
