apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-alerting
  namespace: monitoring
data:
  # Grafana loads this at startup via provisioning
  # Mount this ConfigMap to /etc/grafana/provisioning/alerting/
  slack.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Slack
        receivers:
          - uid: slack-main
            type: slack
            settings:
              url: "$__env{SLACK_WEBHOOK_URL}"
              recipient: "#alerts"
              title: |
                [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ len .Alerts.Firing }}{{ end }}] {{ .CommonLabels.alertname }}
              text: |
                {{ range .Alerts -}}
                *Summary:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Severity:* {{ .Labels.severity }}
                {{ end }}
              iconEmoji: ":bell:"
            disableResolveMessage: false

    policies:
      - orgId: 1
        receiver: Slack
        group_by: ['grafana_folder', 'alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - receiver: Slack
            matchers:
              - severity =~ "critical|warning"
