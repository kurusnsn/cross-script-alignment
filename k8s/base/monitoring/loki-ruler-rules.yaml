apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-ruler-rules
  namespace: monitoring
data:
  alignai-log-alerts.yaml: |
    groups:
      - name: alignai.logs.errors
        interval: 1m
        rules:
          - alert: HighLogErrorRate
            expr: |
              sum(rate({namespace="align-prod"} |= "ERROR" [5m])) > 0.5
            for: 2m
            labels:
              severity: critical
              service: backend
            annotations:
              summary: "High error log rate in production"
              description: "More than 0.5 ERROR log lines/sec over the last 5 minutes in align-prod."

          - alert: ExceptionSpike
            expr: |
              sum(rate({namespace="align-prod"} |~ "Exception|Traceback|500" [5m])) > 0.2
            for: 2m
            labels:
              severity: critical
              service: backend
            annotations:
              summary: "Exception spike in production logs"
              description: "Unusual number of exceptions or 500 errors detected in logs."

          - alert: OOMKillDetected
            expr: |
              sum(rate({namespace="align-prod"} |= "OOMKill" [10m])) > 0
            for: 0m
            labels:
              severity: critical
              service: kubernetes
            annotations:
              summary: "OOMKill detected in production"
              description: "A container in align-prod was killed due to out-of-memory."

          - alert: DatabaseConnectionError
            expr: |
              sum(rate({namespace="align-prod"} |~ "could not connect|connection refused|OperationalError" [5m])) > 0.1
            for: 1m
            labels:
              severity: critical
              service: api
            annotations:
              summary: "Database connection errors in logs"
              description: "Repeated DB connection failures detected in application logs."

          - alert: RedisConnectionError
            expr: |
              sum(rate({namespace="align-prod"} |~ "redis.*error|redis.*refused|ConnectionError" [5m])) > 0.1
            for: 1m
            labels:
              severity: warning
              service: api
            annotations:
              summary: "Redis connection errors in logs"
              description: "Redis connectivity issues detected in application logs."

          - alert: WorkerJobFailures
            expr: |
              sum(rate({namespace="align-prod", app="alignment-service"} |= "ERROR" [5m])) > 0.3
            for: 2m
            labels:
              severity: warning
              service: align-worker
            annotations:
              summary: "Elevated errors in align worker"
              description: "The aligneration worker is producing elevated error logs."

          - alert: TTSServiceErrors
            expr: |
              sum(rate({namespace="align-prod", app="tts-service"} |= "ERROR" [5m])) > 0.2
            for: 2m
            labels:
              severity: warning
              service: tts-service
            annotations:
              summary: "Elevated errors in TTS service"
              description: "The TTS service is producing elevated error logs."
