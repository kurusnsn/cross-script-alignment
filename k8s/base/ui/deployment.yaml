apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: align
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      imagePullSecrets:
      - name: gitlab-registry
      containers:
      - name: ui
        image: registry.gitlab.com/kurusnsn/cross-script-alignment/ui:latest  # Placeholder
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.alignai.com"
        - name: NEXT_PUBLIC_SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: align-secrets
              key: SUPABASE_URL
        - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: align-secrets
              key: SUPABASE_ANON_KEY
        - name: NEXT_PUBLIC_POSTHOG_KEY
          valueFrom:
            secretKeyRef:
              name: align-secrets
              key: POSTHOG_API_KEY
        - name: NEXT_PUBLIC_POSTHOG_HOST
          valueFrom:
            secretKeyRef:
              name: align-secrets
              key: POSTHOG_HOST
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: align
spec:
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: ui
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ui-ingress
  namespace: align
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/whitelist-source-range: "85.230.96.242/32"
spec:
  ingressClassName: nginx
  rules:
  - host: www.alignai.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui
            port:
              number: 80
  - host: alignai.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui
            port:
              number: 80
  tls:
  - hosts:
    - www.alignai.com
    - alignai.com
    secretName: ui-tls
