apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: align-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:kurusnsn/CrossScriptAlignment.git
    targetRevision: dev
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: align-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
